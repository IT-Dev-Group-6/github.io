<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Dev Group 6</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
    }
    header img {
      max-width: 180px;
      height: auto;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2.2em;
    }
    p.subtitle {
      margin-top: 10px;
      color: #9ca3af;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card {
      background: #111827;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      transition: 0.2s ease;
      border: 1px solid #1f2933;
    }
    .card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .card a {
      text-decoration: none;
      color: #60a5fa;
      font-size: 1.2em;
      font-weight: bold;
    }
    .card p {
      margin: 10px 0 0;
      color: #9ca3af;
    }
    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.9em;
      color: #6b7280;
    }
  </style>
</head>
<body>

<header>
  <img src="IT_-_DEV_GROUP_-_6.jpg" alt="IT Dev Group 6 Logo">
  <h1>IT Dev Group 6</h1>
  <p class="subtitle">DCS World Mission Development</p>
</header>

<div class="container">

  <div class="card">
    <a href="https://github.com/IT-Dev-Group-6/dcs-dev-index" target="_blank">
      Mission Repository Index
    </a>
    <p>Central index of missions, documentation, and project structure.</p>
  </div>

  <div class="card">
    <a href="https://github.com/IT-Dev-Group-6/dcs-mission-scripts" target="_blank">
      Mission Scripts
    </a>
    <p>Shared Lua scripting, frameworks, and reusable mission logic.</p>
  </div>

</div>

<footer>
  © IT Dev Group 6
</footer>

</body>
</html>
